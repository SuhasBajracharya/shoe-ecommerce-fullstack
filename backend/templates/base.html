<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>StepStyle Backend</title>
    <style>
      body { font-family: Arial, sans-serif; background:#f5f5f5; color:#222; padding:20px; }
      header { margin-bottom:20px }
      nav a { margin-right:10px }
      .container { max-width:900px; margin:0 auto; background:#fff; padding:20px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.05) }
      .danger { color:crimson }
      .review { border-bottom:1px solid #ddd; padding:8px 0 }
      .grid { display:grid; grid-template-columns:1fr 300px; gap:18px }
    </style>
  </head>
  <body>
    <header>
      <a href="/products">Products</a> |
      <a href="/register">Register</a> |
      <a href="/login">Login</a> |
      <a href="/admin/reviews">Admin Reviews</a>
    </header>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
